name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy-web:
    name: Deploy frontend (apps/web) to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (web)
        working-directory: apps/web
        run: |
          npm ci
      - name: Build (web)
        working-directory: apps/web
        run: |
          npm run build
      - name: Deploy to Vercel (web)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: --prod
          logs-type: tail

  deploy-api:
    name: Deploy API (apps/api) to Vercel
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (api)
        working-directory: apps/api
        run: |
          npm ci
      - name: Build (api)
        working-directory: apps/api
        run: |
          npm run build
      - name: Deploy to Vercel (api)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_API_PROJECT_ID }}
          working-directory: apps/api
          vercel-args: --prod
          logs-type: tail
